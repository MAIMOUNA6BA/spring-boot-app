<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier la tâche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; }
        .card-header {
            background-color: #007bff;
            color: white;
            border-radius: 10px 10px 0 0 !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .btn-add { background-color: #28a745; color: white; border: none; }
        .btn-add:hover { background-color: #218838; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header text-center py-3">
                    Modifier la tâche
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/update}" th:object="${todo}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Titre</label>
                            <input type="text" class="form-control" th:field="*{titre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Status</label>
                            <select class="form-select" th:field="*{statut}">
                                <option value="EN_COURS">EN_COURS</option>
                                <option value="TERMINE">TERMINE</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn btn-add px-4">Mettre à jour</button>
                            <a href="/" class="btn btn-secondary px-4">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
